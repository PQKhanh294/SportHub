<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reset Password | Sport Hub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#2560e9",
                "background-light": "#f6f6f8",
                "background-dark": "#111621",
              },
              fontFamily: {
                "display": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
          },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
<!-- Full-screen sports background with dark overlay -->
<div class="relative min-h-screen w-full flex flex-col items-center justify-center bg-cover bg-center" data-alt="Professional tennis court with blue surface and rackets" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBDxsK_zQ5vctY-HvaUCgYMXS4wbq4LYiS0PS-LSSjc7o_AU7Io3-oilgy0OO21Bvk09pikg2LYTMn_7KaE2Oorp6EpdbhY2laiAfxXqbNB-iIVH0zXEDwUk-Bqsuxplz2Y094H5CGvlG0-pOSLtmmkwp5GRYfZf-YcKwgjaaxBoRqJcKDTM_fMhwnfpckWIN0vprsSQbkYOR_wlQLD1Z_kU5xPYRGLr8t-KaRTRw13MN03FlY6GVrT_yAKgfiAFhyvf3aydrX_X4c');">
<!-- Dark Overlay -->
<div class="absolute inset-0 bg-slate-950/60 backdrop-blur-[2px]"></div>
<!-- Brand Logo Top-Left -->
<div class="absolute top-8 left-8 z-20 flex items-center gap-2 text-white">
<div class="bg-primary p-2 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-2xl">sports_tennis</span>
</div>
<h1 class="text-2xl font-bold tracking-tight">Sport Hub</h1>
</div>
<!-- Reset Password Card -->
<div class="relative z-10 w-full max-w-md px-6">
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-2xl p-8 md:p-10">
<div class="flex flex-col gap-2 mb-8 text-center md:text-left">
<h2 class="text-3xl font-bold text-slate-900 dark:text-white">Reset Password</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Please Enter Your New Credentials To Regain Access To Your Account.</p>
</div>
<form action="#" class="space-y-6" method="POST">
<!-- New Password Input -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="new-password">
                            New Password
                        </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400" id="new-password" name="new-password" placeholder="Enter Your New Password" required="" type="password"/>
</div>
</div>
<!-- Confirm Password Input -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="confirm-password">
                            Confirm Password
                        </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">verified_user</span>
<input class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400" id="confirm-password" name="confirm-password" placeholder="Confirm Your New Password" required="" type="password"/>
</div>
</div>
<!-- Password Requirements (Small UI addition for polish) -->
<div class="grid grid-cols-2 gap-2 py-2">
<div class="flex items-center gap-1.5 text-xs text-slate-500">
<span class="material-symbols-outlined text-[14px] text-green-500">check_circle</span>
                            8+ Characters
                        </div>
<div class="flex items-center gap-1.5 text-xs text-slate-500">
<span class="material-symbols-outlined text-[14px] text-slate-300">circle</span>
                            Special Symbol
                        </div>
</div>
<!-- Reset Password Button -->
<button class="w-full py-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2 group" type="submit">
                        Reset Password
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<a class="text-sm font-medium text-primary hover:underline flex items-center justify-center gap-1" href="#">
<span class="material-symbols-outlined text-sm">keyboard_backspace</span>
                        Back To Login
                    </a>
</div>
</div>
<!-- Bottom Legal/Footer Links -->
<div class="mt-8 flex justify-center gap-6 text-slate-400 text-xs font-medium uppercase tracking-widest">
<a class="hover:text-white transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-white transition-colors" href="#">Terms Of Service</a>
<a class="hover:text-white transition-colors" href="#">Support</a>
</div>
</div>
</div>
</body></html>
