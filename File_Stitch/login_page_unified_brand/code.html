                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",

<!-- Background Image with Overlay and Blur -->

<img alt="Tennis Court" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBqFm-aKP5EiL6q4BUrYnrOkr3P1MOFlI23qXs44yF0IIpGLNOl9Ne0xtH345c0ogmqAGgr7UXvo5AGIzk7O4g21CS8S9__eCz1vYYMR9OTmF_fDmqTUbunaEPwHsZZ0ywkP_bRSlae0vOnNpTmZpQtOMUSiga_lRYfKev5qw9VNqFjikaM53-zrAwScQ__km5awA7jvVdOtGEs7uyB8uWkPKvjh8NAViagalz3vXsc-54fQsHos1eeZOE5n4F1gH--M7jRKzE1npU"/>
<div class="absolute inset-0 bg-slate-900/60 backdrop-blur-[2px]"></div>
</div>
<!-- Header / Logo Top Left -->
<header class="relative z-20 p-6 lg:p-10 flex items-center">
<div class="flex items-center gap-2 group cursor-pointer">
<div class="bg-primary p-2 rounded-lg text-white">

</div>
<span class="text-xl font-black text-white tracking-tighter uppercase">Sport Hub</span>
</div>
</header>
<!-- Content Center -->
<main class="relative z-10 flex items-center justify-center min-h-[calc(100vh-160px)] p-4">
<div class="w-full max-w-[480px]">
<!-- Card Container (Rounded 16px) -->
<div class="bg-white/95 dark:bg-slate-900/95 backdrop-blur-md rounded-lg shadow-2xl border border-white/20 dark:border-slate-800 overflow-hidden">
<!-- Header Section -->
<div class="px-8 pt-10 pb-6 text-center">
<h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">Welcome Back</h1>
<p class="mt-2 text-slate-500 dark:text-slate-400">Login To Your Sport Hub Account</p>
</div>
<!-- Form Section -->
<form class="px-8 pb-10 space-y-5">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Email Address</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="Enter Your Email Address" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
</div>
<div class="relative flex items-center">
<input class="w-full h-12 px-4 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="Enter Your Password" type="password"/>
<button class="absolute right-3 text-slate-400 hover:text-primary transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[22px]">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="text-sm font-medium text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<!-- Action Button -->
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-md hover:shadow-lg transform active:scale-[0.98] transition-all" type="submit">
                        Login Now
                    </button>
<!-- Divider -->
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
<span class="flex-shrink mx-4 text-xs font-semibold text-slate-400 uppercase tracking-widest">Or Login With</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
</div>
<!-- Register Link -->
<p class="text-center text-sm text-slate-600 dark:text-slate-400">
                        Don't Have An Account? 
                        <a class="font-bold text-primary hover:underline ml-1" href="#">Register Now</a>
</p>
</form>
</div>
</div>
</main>
<!-- Footer Consistent -->
<footer class="relative z-10 p-8 flex flex-col items-center space-y-4">
<div class="flex items-center space-x-6">
<a class="text-white/70 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined">Help Center</span>
</a>
<a class="text-white/70 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined">Language Settings</span>
</a>
<a class="text-white/70 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined">Account Settings</span>
</a>
</div>
<p class="text-xs text-white/50 font-medium uppercase tracking-widest">© 2024 Sport Hub. All Rights Reserved.</p>
</footer>
</body></html>
