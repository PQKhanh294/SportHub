<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563EB",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Sport Hub - Create Your Account</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen relative">
<!-- Background Image with Overlay and Blur -->
<div class="fixed inset-0 z-0">
<img alt="Tennis Court Background" class="w-full h-full object-cover blur-[2px]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUza5132mWsTyImpUy0vlW4X-kZpUEoGTZ59X6UajDHu2_MgcIEBoeBhwigWvDiPaBLayqOXLt9Ccfkea_SPlCUzectqbl8ZulRDOKYPVWat5SxT1CbCUuyAdkSyvzhLB2NBxI5yf980fgJoyaNl6wI3rO_jNsfVXXkJFM1xF7upN_S_YuU3901h3VniekW2-_SYdgBWJFq_pRnRg6lqBLRSfz8tF9UERk3jf8jPetGEpv9VrmQ9QnqrzOOzo9yEpwAwdwQclUGCA"/>
<div class="absolute inset-0 bg-slate-900/40 backdrop-blur-[1px]"></div>
</div>
<div class="relative z-10 flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap px-6 md:px-10 py-4 bg-white/10 backdrop-blur-md border-b border-white/10 sticky top-0 z-50">
<div class="flex items-center gap-3 text-white">
<div class="size-8 flex items-center justify-center bg-primary rounded-lg shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-white text-2xl">sports_volleyball</span>
</div>
<h2 class="text-white text-xl font-bold leading-tight tracking-tight">Sport Hub</h2>
</div>
<div class="flex flex-1 justify-end gap-6 items-center">
<div class="hidden md:flex items-center gap-6">
<a class="text-white/90 text-sm font-medium hover:text-white transition-colors" href="#">Login</a>
</div>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-6 bg-primary text-white text-sm font-bold transition-all hover:bg-primary/90 shadow-sm shadow-primary/20">
<span class="truncate">Help</span>
</button>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-6 md:p-12">
<!-- Registration Card with 16px (1rem) rounded corners -->
<div class="w-full max-w-[520px] bg-white dark:bg-slate-900 p-8 md:p-12 rounded-[16px] shadow-2xl border border-white/20">
<!-- Title Section -->
<div class="flex flex-col gap-2 mb-8 text-center">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-extrabold leading-tight tracking-tight">Create Your Account</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal">Join The Sport Hub Community Today</p>
</div>
<!-- Role Selection -->
<div class="flex flex-col gap-3 mb-8">
<h4 class="text-slate-700 dark:text-slate-300 text-sm font-bold leading-normal tracking-wide uppercase text-center">Select Your Role</h4>
<div class="flex h-12 items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 p-1.5">
<label class="group relative flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 text-slate-500 dark:text-slate-400 text-sm font-semibold transition-all">
<input checked="" class="peer absolute opacity-0" name="role-selection" type="radio" value="Player"/>
<span class="z-10 peer-checked:text-primary transition-colors">Player</span>
<div class="absolute inset-0 bg-white dark:bg-slate-700 shadow-sm scale-95 opacity-0 peer-checked:scale-100 peer-checked:opacity-100 transition-all rounded-lg"></div>
</label>
<label class="group relative flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 text-slate-500 dark:text-slate-400 text-sm font-semibold transition-all">
<input class="peer absolute opacity-0" name="role-selection" type="radio" value="Court Owner"/>
<span class="z-10 peer-checked:text-primary transition-colors">Court Owner</span>
<div class="absolute inset-0 bg-white dark:bg-slate-700 shadow-sm scale-95 opacity-0 peer-checked:scale-100 peer-checked:opacity-100 transition-all rounded-lg"></div>
</label>
</div>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold px-1">Email Or Phone</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:border-primary h-12 pl-12 pr-4 placeholder:text-slate-400 text-base font-normal transition-all" placeholder="Enter Your Email Or Phone" type="text"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold px-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:border-primary h-12 pl-12 pr-4 placeholder:text-slate-400 text-base font-normal transition-all" placeholder="Password" type="password"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold px-1">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">verified_user</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:border-primary h-12 pl-12 pr-4 placeholder:text-slate-400 text-base font-normal transition-all" placeholder="Confirm Password" type="password"/>
</div>
</div>
</div>
<div class="flex items-start gap-3 px-1 pt-2">
<input class="mt-1 h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary/30 dark:border-slate-700 dark:bg-slate-800" id="terms" type="checkbox"/>
<label class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed" for="terms">
                                By Registering, You Agree To Our <a class="text-primary font-semibold" href="#">Terms Of Service</a> And <a class="text-primary font-semibold" href="#">Privacy Policy</a>.
                            </label>
</div>
<!-- Submit Button -->
<button class="flex w-full cursor-pointer items-center justify-center rounded-xl h-14 bg-primary text-white text-base font-bold transition-all hover:bg-primary/90 shadow-lg shadow-primary/25 mt-4" type="submit">
<span class="truncate">Register Now</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center border-t border-slate-100 dark:border-slate-800 pt-6">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                            Already Have An Account? <a class="text-primary font-bold hover:underline" href="#">Log In</a>
</p>
</div>
</div>
</main>
</div>
</div>
</body></html>
