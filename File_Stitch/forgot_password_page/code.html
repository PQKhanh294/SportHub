<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2560e9",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Forgot Password - Sport Hub</title>
</head>
<body class="font-display bg-background-light dark:bg-background-dark antialiased">
<!-- Full-screen Background with Sport Photography -->
<div class="relative min-h-screen w-full flex flex-col items-center justify-center bg-cover bg-center bg-no-repeat" data-alt="Professional tennis player serving on court at sunset" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBLMTJLLJTPaSEG_PIsdFNltGY_XVTjwM-Hdp3y9Vq3tsYhxj64wyULUXVpssnt4Bx6vU2u6odMJAbeOBg1BQc2sYDCkASHq2joG5xlBgClwYLznkztHyvYmWKhixP-Pe8fvVWTe5q6mO-t8PZh8RIeitB-WzqBpLUI8c3MilNrjUSFrJQ61pote_Ikpu9bQuxULOJUZ9m0tqCkz_uaWNjRzHqsZshrEbkPUhCca93mDairZcxwfvJCXsBDODwP0VrhKGnIdKLqrJs');">
<!-- Dark Overlay -->
<div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
<!-- Brand Logo Top-Left -->
<div class="absolute top-8 left-8 z-20 flex items-center gap-2 text-white">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">sports_tennis</span>
</div>
<h2 class="text-xl font-bold tracking-tight">Sport Hub</h2>
</div>
<!-- Centered Card -->
<div class="relative z-10 w-full max-w-md px-6">
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-2xl p-8 md:p-10">
<div class="flex flex-col items-center text-center mb-8">
<div class="size-16 bg-primary/10 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-3xl">lock_reset</span>
</div>
<h1 class="text-2xl font-bold text-slate-900 dark:text-white">Forgot Password</h1>
<p class="mt-2 text-slate-500 dark:text-slate-400">
                        Enter Your Email Address To Receive A Reset Code
                    </p>
</div>
<form action="#" class="space-y-6">
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2" for="email">
                            Email Address
                        </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">
                                mail
                            </span>
<input class="w-full pl-12 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-slate-900 dark:text-white" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<button class="w-full py-4 bg-primary hover:bg-blue-700 text-white font-bold rounded-lg shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2" type="submit">
<span>Send Reset Code</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<div class="mt-8 text-center">
<a class="inline-flex items-center gap-2 text-primary font-semibold hover:underline group" href="/login">
<span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span>
                        Back To Login
                    </a>
</div>
</div>
<!-- Footer Text -->
<p class="mt-8 text-center text-white/60 text-sm">
                © 2024 Sport Hub Inc. All Rights Reserved.
            </p>
</div>
</div>
</body></html>
